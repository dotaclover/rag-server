<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACFlow RAG 检索服务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 10px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px 10px;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header .subtitle {
            font-size: 0.9em;
            opacity: 0.95;
        }
        
        .search-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        #searchInput {
            width: 100%;
            padding: 15px;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
        }
        
        #searchInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        #searchBtn {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        #searchBtn:active {
            transform: scale(0.98);
        }
        
        .examples {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .example-chip {
            padding: 8px 12px;
            background: #f5f5f5;
            border-radius: 15px;
            font-size: 0.85em;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .example-chip:active {
            background: #667eea;
            color: white;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.1em;
            padding: 20px;
            display: none;
        }
        
        .error {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
            margin-bottom: 15px;
        }
        
        .results {
            display: none;
        }
        
        .result-header {
            color: white;
            font-size: 1em;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }
        
        .result-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .result-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }
        
        .result-title {
            font-size: 1.2em;
            color: #333;
            font-weight: bold;
            flex: 1;
            line-height: 1.3;
        }
        
        .result-score {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .result-meta {
            display: flex;
            flex-direction: column;
            gap: 5px;
            color: #888;
            font-size: 0.9em;
            margin-bottom: 12px;
        }
        
        .result-text {
            color: #555;
            line-height: 1.6;
            font-size: 0.95em;
        }
        
        @media (min-width: 768px) {
            body { padding: 20px; }
            .container { padding: 0 20px; }
            .header { margin-bottom: 40px; }
            .header h1 { font-size: 3em; }
            .header .subtitle { font-size: 1.2em; }
            .search-container { padding: 30px; }
            .search-box { flex-direction: row; gap: 10px; }
            #searchInput { flex: 1; }
            #searchBtn { width: auto; padding: 15px 40px; }
            .result-meta { flex-direction: row; gap: 15px; }
            .example-chip:hover {
                background: #667eea;
                color: white;
                transform: translateY(-2px);
            }
            .result-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 ACFlow RAG</h1>
            <div class="subtitle">劳动法智能检索 · 524条专业文档</div>
            <div class="subtitle" style="font-size:0.85em;margin-top:8px;opacity:0.85">返回最接近的5条结果</div>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入问题..." autofocus />
                <button id="searchBtn">搜索</button>
            </div>
            
            <div class="examples">
                <div class="example-chip" data-query="试用期一般多久">试用期多久</div>
                <div class="example-chip" data-query="加班工资怎么算">加班工资</div>
                <div class="example-chip" data-query="公司可以随意辞退员工吗">辞退员工</div>
                <div class="example-chip" data-query="年假有几天">年假天数</div>
            </div>
        </div>
        
        <div class="loading" id="loading">⏳ 搜索中...</div>
        <div class="error" id="error"></div>
        <div class="results" id="results"></div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');

        searchBtn.addEventListener('click', search);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
        
        document.querySelectorAll('.example-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                searchInput.value = chip.dataset.query;
                search();
            });
        });

        async function search() {
            const query = searchInput.value.trim();
            
            if (!query) {
                searchInput.focus();
                return;
            }

            loading.style.display = 'block';
            error.style.display = 'none';
            results.style.display = 'none';

            try {
                const response = await fetch('api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, top_k: 5 })
                });

                const data = await response.json();
                loading.style.display = 'none';
                
                if (response.ok) {
                    displayResults(data);
                } else {
                    showError(data.error || '搜索失败');
                }
            } catch (err) {
                loading.style.display = 'none';
                showError('网络错误：' + err.message);
            }
        }

        function displayResults(data) {
            console.log('Search results:', data);
            
            if (!data.results || data.results.length === 0) {
                results.innerHTML = '<div class="result-card">😔 未找到相关结果</div>';
                results.style.display = 'block';
                return;
            }

            const header = `<div class="result-header">✨ 找到 ${data.total} 条结果</div>`;
            const cards = data.results.map(item => `
                <div class="result-card">
                    <div class="result-top">
                        <div class="result-title">${escapeHtml(item.title)}</div>
                        <div class="result-score">${(item.score * 100).toFixed(0)}%</div>
                    </div>
                    <div class="result-meta">
                        <span>📚 ${escapeHtml(item.source)}</span>
                        <span>📑 ${escapeHtml(item.section)}</span>
                    </div>
                    <div class="result-text">${escapeHtml(item.text)}</div>
                </div>
            `).join('');

            results.innerHTML = header + cards;
            results.style.display = 'block';
        }

        function showError(message) {
            error.textContent = '❌ ' + message;
            error.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
